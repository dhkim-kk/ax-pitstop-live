<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>피트스탑 AX — Live</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--red:#FF3A2F;}
html,body{height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
@keyframes fadeOut{0%{opacity:1;}100%{opacity:0;transform:translate(-50%,-50%) scale(.8);}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}40%{opacity:.9;transform:translateY(-110px) scale(1.25);}100%{opacity:0;transform:translateY(-320px) scale(.5);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 20px 10px;background:linear-gradient(to bottom,rgba(0,0,0,.88) 0%,transparent 100%);}
.hdr-left{display:flex;align-items:center;gap:12px;}
.ct-logo{height:26px;width:auto;cursor:pointer;flex-shrink:0;mix-blend-mode:screen;}
.live-pill{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:white;font-size:9px;font-weight:900;letter-spacing:1.2px;padding:3px 8px;border-radius:4px;}
.live-dot{width:5px;height:5px;background:white;border-radius:50%;animation:pulse 1.5s infinite;}
.event-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.6);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.viewer-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);padding:5px 12px;border-radius:20px;font-size:13px;font-weight:600;color:white;}
#admin-badge{font-size:10px;font-weight:700;color:white;background:var(--red);padding:3px 10px;border-radius:20px;display:none;}
#reset-btn{font-size:11px;color:rgba(255,255,255,.4);background:none;border:1px solid rgba(255,255,255,.15);cursor:pointer;padding:4px 10px;border-radius:20px;display:none;}
#reset-btn:hover{color:white;}
#board{position:fixed;top:64px;left:0;right:0;bottom:82px;overflow:hidden;z-index:10;cursor:grab;user-select:none;}
#board.panning{cursor:grabbing;}
#canvas{position:absolute;left:0;top:0;width:6000px;height:5000px;transform-origin:0 0;}
.mcard{position:absolute;background:rgba(255,255,255,.11);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:14px 18px 12px;max-width:340px;min-width:120px;cursor:default;transition:box-shadow .25s;}
.mcard:hover{z-index:500!important;box-shadow:0 12px 60px rgba(0,0,0,.75);transform:translate(-50%,-50%) scale(2) rotate(0deg)!important;transition:box-shadow .2s,transform .25s cubic-bezier(.34,1.3,.64,1);}
.mcard.focused{z-index:400!important;box-shadow:0 0 0 3px rgba(255,58,47,.7),0 16px 60px rgba(0,0,0,.85)!important;transform:translate(-50%,-50%) scale(1) rotate(0deg)!important;transition:box-shadow .6s,transform .6s!important;}
#master-ui{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:10px;}
.master-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:white;font-size:13px;font-weight:600;padding:8px 20px;border-radius:24px;cursor:pointer;backdrop-filter:blur(12px);transition:background .15s;}
.master-btn:hover{background:rgba(255,255,255,.24);}
.master-btn.active{background:var(--red);border-color:var(--red);}
#master-counter{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:12px;padding:8px 16px;border-radius:24px;backdrop-filter:blur(12px);min-width:80px;text-align:center;}
#master-badge{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(255,58,47,.9);color:white;font-size:10px;font-weight:900;letter-spacing:1.5px;padding:4px 14px;border-radius:4px;backdrop-filter:blur(8px);}
.mcard.fading{animation:fadeOut .6s ease forwards!important;}
.mcard-name{font-size:13px;font-weight:700;margin-bottom:5px;}
.mcard-text{font-size:22px;font-weight:500;color:rgba(255,255,255,.92);line-height:1.4;word-break:break-word;}
.mcard-img{margin-top:10px;border-radius:12px;overflow:hidden;}
.mcard-img img{width:100%;max-height:200px;object-fit:cover;display:block;border-radius:12px;}
.mcard-del{position:absolute;top:6px;right:8px;display:none;background:rgba(255,50,50,.75);border:none;cursor:pointer;color:white;font-size:10px;width:18px;height:18px;border-radius:50%;align-items:center;justify-content:center;}
.admin-mode .mcard:hover .mcard-del{display:flex;}
.qr-panel{position:fixed;top:60px;right:16px;z-index:80;background:rgba(255,255,255,.08);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;}
#qrcode{width:110px;height:110px;border-radius:8px;overflow:hidden;}
.qr-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.5px;}
#resp-count{font-size:10px;color:rgba(255,255,255,.3);}
.float-item{position:fixed;pointer-events:none;z-index:200;animation:floatUp 2.6s ease-out forwards;mix-blend-mode:screen;}
.input-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:8px 14px 20px;background:linear-gradient(to top,rgba(0,0,0,.92) 60%,transparent 100%);}
.preview-row{display:none;align-items:center;gap:8px;margin-bottom:6px;padding:0 4px;}
.preview-row img{height:48px;border-radius:8px;object-fit:cover;}
.preview-clear{background:rgba(255,50,50,.8);border:none;cursor:pointer;color:white;font-size:10px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.preview-label{font-size:11px;color:rgba(255,255,255,.5);}
.input-row{display:flex;align-items:center;gap:8px;}
.ibox{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:26px;padding:0 14px;gap:8px;}
.ibox:focus-within{border-color:rgba(255,255,255,.35);}
#inp-name{width:80px;flex-shrink:0;background:none;border:none;outline:none;font-size:14px;font-weight:600;color:rgba(255,255,255,.65);font-family:inherit;border-right:1px solid rgba(255,255,255,.12);padding:12px 10px 12px 0;}
#inp-name::placeholder{color:rgba(255,255,255,.25);}
#inp-msg{flex:1;background:none;border:none;outline:none;font-size:15px;color:white;font-family:inherit;padding:12px 0;}
#inp-msg::placeholder{color:rgba(255,255,255,.25);}
.hbtn,.pbtn{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.hbtn:hover,.pbtn:hover{transform:scale(1.1);}
.pbtn.active{border-color:var(--red);background:rgba(255,58,47,.2);}
.sbtn{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--red);border:none;cursor:pointer;font-size:17px;color:white;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s;}
.sbtn:hover{transform:scale(1.08);}
.sbtn:disabled{opacity:.4;cursor:not-allowed;}
.color-row{display:flex;align-items:center;gap:6px;padding:0 2px;margin-bottom:5px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
.color-row::-webkit-scrollbar{display:none;}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .15s,border-color .15s;}
.cswatch:hover{transform:scale(1.18);}
.cswatch.selected{border-color:white;transform:scale(1.18);box-shadow:0 0 0 1px rgba(0,0,0,.3);}
.cswatch.default-swatch{background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.06));border-color:rgba(255,255,255,.3);}
.cswatch.default-swatch.selected{border-color:white;}
@media(max-width:640px){
  #inp-name{width:60px;font-size:13px;}
  #inp-msg{font-size:13px;}
  .hbtn,.pbtn,.sbtn{width:38px;height:38px;font-size:17px;}
  .ibox{padding:0 10px;gap:6px;}
  #inp-name{padding:11px 8px 11px 0;}
  #inp-msg{padding:11px 0;}
  .input-bar{padding:6px 10px 18px;}
  .input-row{gap:6px;}
}
#submit-view{min-height:100vh;display:flex;align-items:flex-end;background:#0a0a0a;}
.s-panel{width:100%;background:#1c1c1e;border-radius:26px 26px 0 0;padding:20px 20px 40px;}
.s-logo{height:20px;width:auto;margin-bottom:16px;mix-blend-mode:screen;opacity:.85;}
.s-drag{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:0 auto 20px;}
.s-title{font-size:18px;font-weight:900;color:white;margin-bottom:3px;}
.s-sub{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:22px;}
.s-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:1.2px;margin-bottom:8px;}
.s-inp{width:100%;padding:13px 16px;margin-bottom:14px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;font-size:15px;color:white;font-family:inherit;outline:none;transition:border-color .18s;}
.s-inp:focus{border-color:var(--red);}
.s-inp::placeholder{color:rgba(255,255,255,.2);}
textarea.s-inp{resize:none;height:88px;line-height:1.55;}
#m-char{text-align:right;font-size:10px;color:rgba(255,255,255,.2);margin-top:-10px;margin-bottom:14px;}
.s-photo-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.s-photo-btn{flex:1;padding:12px;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.2);border-radius:12px;color:rgba(255,255,255,.45);font-size:13px;cursor:pointer;font-family:inherit;text-align:center;transition:all .18s;}
.s-photo-btn:hover,.s-photo-btn.has-img{border-color:var(--red);color:var(--red);}
#m-img-preview{display:none;width:100%;max-height:180px;object-fit:cover;border-radius:12px;margin-bottom:14px;}
.s-send{width:100%;padding:15px;background:var(--red);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.s-send:hover{opacity:.88;}
.s-send:disabled{opacity:.4;cursor:not-allowed;}
#m-ok{display:none;margin-top:14px;text-align:center;color:rgba(255,255,255,.5);font-size:14px;animation:fadeIn .3s;}
</style>
</head>

const BG_COLORS=[
  {bg:null,     tc:null},

function swatchHTML(varName,onchange){
  return BG_COLORS.map((col,i)=>{
    const style=col.bg?`background:${col.bg};`:'';
    const cls='cswatch'+(col.bg?'':' default-swatch')+(i===0?' selected':'');
    return `<div class="${cls}" data-idx="${i}" style="${style}" title="${col.bg||'기본'}" onclick="${onchange}(${i})"></div>`;
  }).join('');
}

function pickColor(idx,prefix){
  selBg=BG_COLORS[idx].bg;
  selTc=BG_COLORS[idx].tc;
  document.querySelectorAll('.'+prefix+'-swatch .cswatch').forEach((el,i)=>{
    el.classList.toggle('selected',i===idx);
  });
}
function pickColorD(idx){pickColor(idx,'d');}
function pickColorM(idx){pickColor(idx,'m');}

function autoNameColor(bg){try{const r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16);const lum=(0.299*r+0.587*g+0.114*b)/255;return lum>0.45?'rgba(0,0,0,.75)':'rgba(255,255,255,.85)';}catch{return 'rgba(255,255,255,.85)';}}
let panX=0,panY=0,scale=1,isPanning=false,panSX=0,panSY=0,panOX=0,panOY=0;
let dragCard=null,dragOX=0,dragOY=0;
function applyPan(){const cv=document.getElementById('canvas');if(cv)cv.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;}

function buildZones(){
  const xs=[12,26,40,54,68,82],ys=[14,32,52,72];
  const z=[];
  xs.forEach(x=>ys.forEach(y=>z.push({x,y})));
  for(let i=z.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[z[i],z[j]]=[z[j],z[i]];}
  return z;
}
const ZONES=buildZones();
let zoneIdx=0;

function getPos(){
  // 캔버스 전체에 완전 랜덤 배치 (6000x5000 거의 전체)
  return{x:rnd(150,5700), y:rnd(150,4700)};
}
function colorFor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return PALETTE[Math.abs(h)%PALETTE.length];}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rnd(a,b){return a+Math.random()*(b-a);}

async function compressImage(file,maxW=1000,q=0.78){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const r=Math.min(1,maxW/img.width),w=Math.round(img.width*r),h=Math.round(img.height*r);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      cv.toBlob(b=>b?res(b):rej(new Error('fail')),'image/jpeg',q);
    };
    img.onerror=rej;img.src=url;
  });
}

async function uploadImage(file){
  const blob=await compressImage(file);
  const ref=storage.ref('ax-pitstop-photos/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9.]/g,'_'));
  const snap=await ref.put(blob,{contentType:'image/jpeg'});
  return await snap.ref.getDownloadURL();
}

function addCard(m,docId,animate){
  const board=document.getElementById('board');
  const canvas=document.getElementById('canvas');
  const bw=board.offsetWidth,bh=board.offsetHeight;
  const col=colorFor(m.name);
  const rot=rnd(-5,5);
  const pos=getPos();
  const card=document.createElement('div');
  card.className='mcard';
  card.dataset.id=docId;
  const imgHtml=m.imageUrl?`<div class="mcard-img"><img src="${m.imageUrl}" loading="lazy"/></div>`:'';
  const timeStr=m.t?new Date(m.t.seconds*1000).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
  card.innerHTML=`
    <button class="mcard-del" onclick="deleteOne('${docId}',this)">✕</button>
    <div class="mcard-name" style="color:${col};">${esc(m.name)} <span style="font-size:10px;font-weight:400;opacity:.45;margin-left:4px;">${timeStr}</span></div>
    <div class="mcard-text">${esc(m.msg)}</div>
    ${imgHtml}`;
  card.addEventListener('mousedown',e=>startCardDrag(e,card));
  card.addEventListener('touchstart',e=>startCardDrag(e,card),{passive:false});
  if(animate){
    const sx=bw/2-panX,sy=bh/2-panY;
    card.style.cssText=`position:absolute;left:${sx}px;top:${sy}px;transform:translate(-50%,-50%) scale(0) rotate(${rot}deg);z-index:200;transition:transform .45s cubic-bezier(.34,1.56,.64,1);`;
    canvas.appendChild(card);
    cardQueue.push({el:card,docId});
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      card.style.transform=`translate(-50%,-50%) scale(1.1) rotate(${rot}deg)`;
    }));
    setTimeout(()=>{
      card.style.transition='left .9s cubic-bezier(.25,.46,.45,.94),top .9s cubic-bezier(.25,.46,.45,.94),transform .9s cubic-bezier(.25,.46,.45,.94)';
      card.style.left=pos.x+'px';card.style.top=pos.y+'px';
      card.style.transform=`translate(-50%,-50%) scale(1) rotate(${rot}deg)`;
      setTimeout(()=>{card.style.zIndex='11';card.style.transition='box-shadow .25s';},950);
      // 새 카드 위치로 카메라 이동
      panToCard(pos.x,pos.y);
    },1400);
  }else{
    card.style.cssText=`position:absolute;left:${pos.x}px;top:${pos.y}px;transform:translate(-50%,-50%) scale(1) rotate(${rot}deg);z-index:11;transition:box-shadow .25s;`;
    canvas.appendChild(card);
    cardQueue.push({el:card,docId});
  }
  // 배경색/글씨색 — cssText 이후에 적용해야 덮어쓰이지 않음
  if(m.bgColor){
    const tc=autoNameColor(m.bgColor);
    card.style.background=m.bgColor;
    card.style.borderColor='transparent';
    card.style.backdropFilter='none';
    card.style.webkitBackdropFilter='none';
    const nameEl=card.querySelector('.mcard-name');
    const textEl=card.querySelector('.mcard-text');
    const spanEl=nameEl&&nameEl.querySelector('span');
    if(nameEl)nameEl.style.color=tc;
    if(spanEl){spanEl.style.opacity='0.7';spanEl.style.color=tc;}
    if(textEl)textEl.style.color=tc;
  }
}

function startCardDrag(e,card){
  e.stopPropagation();
  const t=e.touches?e.touches[0]:e;
  const br=document.getElementById('board').getBoundingClientRect();
  dragOX=t.clientX-br.left-panX-parseFloat(card.style.left||0);
  dragOY=t.clientY-br.top-panY-parseFloat(card.style.top||0);
  dragCard=card;card.style.zIndex='300';card.style.transition='box-shadow .25s';
  if(e.cancelable)e.preventDefault();
}

function panToCard(cx,cy){
  const board=document.getElementById('board');
  const bw=board.offsetWidth,bh=board.offsetHeight;
  // 카드가 화면 중앙에 오도록 pan 조정
  const targetPanX=bw/2-cx*scale;
  const targetPanY=bh/2-cy*scale;
  animatePan(targetPanX,targetPanY,600);
}

function animatePan(tpx,tpy,dur){
  const startPX=panX,startPY=panY,startT=performance.now();
  function step(now){
    const p=Math.min(1,(now-startT)/dur);
    const ease=1-Math.pow(1-p,3);
    panX=startPX+(tpx-startPX)*ease;
    panY=startPY+(tpy-startPY)*ease;
    applyPan();
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function goHome(){

  const bw=board.offsetWidth,bh=board.offsetHeight;

function initPasteAndDrop(){
  document.addEventListener('paste',e=>{
    const items=e.clipboardData&&e.clipboardData.items;
    if(!items)return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        const file=item.getAsFile();
        if(file)attachImageFile(file);
        break;
      }
    }
  });
  const board=document.getElementById('board');
  board.addEventListener('dragover',e=>{
    if(e.dataTransfer.types.includes('Files')){
      e.preventDefault();
      board.style.outline='2px dashed rgba(255,58,47,.6)';
    }
  });
  board.addEventListener('dragleave',()=>board.style.outline='');
  board.addEventListener('drop',e=>{
    e.preventDefault();board.style.outline='';
    const files=e.dataTransfer.files;
    if(files&&files[0]&&files[0].type.startsWith('image/'))attachImageFile(files[0]);
  });
}

function initBoardEvents(){
  const board=document.getElementById('board');
  board.addEventListener('mousedown',e=>{
    if(e.target.closest('.mcard'))return;
    isPanning=true;board.classList.add('panning');
    panSX=e.clientX;panSY=e.clientY;panOX=panX;panOY=panY;
  });
  document.addEventListener('mousemove',e=>{
    if(dragCard){
      const br=board.getBoundingClientRect();
      dragCard.style.left=(e.clientX-br.left-panX-dragOX)+'px';
      dragCard.style.top=(e.clientY-br.top-panY-dragOY)+'px';return;
    }
    if(!isPanning)return;
    panX=panOX+(e.clientX-panSX);panY=panOY+(e.clientY-panSY);applyPan();
  });
  document.addEventListener('mouseup',()=>{
    isPanning=false;board.classList.remove('panning');
    if(dragCard){dragCard.style.zIndex='11';dragCard=null;}
  });
  board.addEventListener('wheel',e=>{
    e.preventDefault();
    if(e.ctrlKey||e.metaKey){
      // 핀치 또는 Ctrl+스크롤 → 확대/축소
      const br=board.getBoundingClientRect();
      const mx=e.clientX-br.left, my=e.clientY-br.top;
      const factor=e.deltaY<0?1.08:0.93;
      const newScale=Math.max(0.2,Math.min(5,scale*factor));
      panX=mx-(mx-panX)*(newScale/scale);
      panY=my-(my-panY)*(newScale/scale);
      scale=newScale;
    }else{
      panX-=e.deltaX;panY-=e.deltaY;
    }
    applyPan();
  },{passive:false});
  let tpStart=null,pinchStart=null;
  function getPinchDist(touches){const dx=touches[0].clientX-touches[1].clientX,dy=touches[0].clientY-touches[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
  function getPinchCenter(touches,br){return{x:(touches[0].clientX+touches[1].clientX)/2-br.left,y:(touches[0].clientY+touches[1].clientY)/2-br.top};}
  board.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      tpStart=null;
      const br=board.getBoundingClientRect();
      pinchStart={dist:getPinchDist(e.touches),scale,panX,panY,center:getPinchCenter(e.touches,br)};
      return;
    }
    if(e.target.closest('.mcard'))return;
    if(e.touches.length===1)tpStart={x:e.touches[0].clientX,y:e.touches[0].clientY,px:panX,py:panY};
  },{passive:true});
  board.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinchStart){
      if(e.cancelable)e.preventDefault();
      const br=board.getBoundingClientRect();
      const dist=getPinchDist(e.touches);
      const newScale=Math.max(0.2,Math.min(5,pinchStart.scale*(dist/pinchStart.dist)));
      const cx=pinchStart.center.x,cy=pinchStart.center.y;
      scale=newScale;
      panX=cx-(cx-pinchStart.panX)*(newScale/pinchStart.scale);
      panY=cy-(cy-pinchStart.panY)*(newScale/pinchStart.scale);
      applyPan();return;
    }
    if(dragCard){
      const br=board.getBoundingClientRect();const t=e.touches[0];
      dragCard.style.left=(t.clientX-br.left-panX-dragOX)+'px';
      dragCard.style.top=(t.clientY-br.top-panY-dragOY)+'px';
      if(e.cancelable)e.preventDefault();return;
    }
    if(!tpStart||e.touches.length!==1)return;
    panX=tpStart.px+(e.touches[0].clientX-tpStart.x);
    panY=tpStart.py+(e.touches[0].clientY-tpStart.y);
    applyPan();if(e.cancelable)e.preventDefault();
  },{passive:false});
  board.addEventListener('touchend',e=>{
    if(e.touches.length<2)pinchStart=null;
    if(e.touches.length===0){tpStart=null;if(dragCard){dragCard.style.zIndex='11';dragCard=null;}}
  });
}

function fadeCard(el){
  if(!el)return;
  el.classList.add('fading');
  setTimeout(()=>el.remove(),650);
}

async function sendMsg(){
  const name=document.getElementById('inp-name').value.trim();
  const msg=document.getElementById('inp-msg').value.trim();
  if(!name||!msg){alert('이름과 메세지를 입력해주세요!');return;}
  const btn=document.getElementById('d-send');btn.disabled=true;
  try{
    let imageUrl='';
    if(dFile){
      btn.textContent='📤';
      try{
        imageUrl=await Promise.race([uploadImage(dFile),new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),12000))]);
      }catch(e){
        console.warn('Storage:',e.message);
        if(!confirm('사진 업로드 실패.\n사진 없이 메세지만 보낼까요?')){btn.textContent='➤';btn.disabled=false;return;}
      }
    }
    await msgsRef.add({name,msg,imageUrl,bgColor:selBg||'',textColor:selTc||'',t:firebase.firestore.FieldValue.serverTimestamp()});
    document.getElementById('inp-msg').value='';
    clearDFile();
    spawnFloats(6);
    // 색상 유지 (다음 메세지도 같은 색으로)
  }catch(e){alert('오류: '+e.message);}
  btn.textContent='➤';btn.disabled=false;
}

async function broadcastHeart(){
  spawnFloats(8); // 로컬 즉시 표시
  try{
    await reactRef.add({t:firebase.firestore.FieldValue.serverTimestamp(),count:8});
    // 5초 후 자동 삭제
    const snap=await reactRef.orderBy('t','desc').limit(1).get();
    snap.docs.forEach(d=>setTimeout(()=>d.ref.delete(),5000));
  }catch(e){console.warn('react:',e);}
}

function spawnFloats(n){
  const pool=[...HEARTS,'WL','WL','CL','CL'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const type=pool[Math.floor(Math.random()*pool.length)];
      const el=document.createElement('div');
      el.className='float-item';
      el.style.left=(12+Math.random()*68)+'vw';
      el.style.bottom=(8+Math.random()*62)+'vh';
      el.style.animationDuration=(1.8+Math.random()*1.4)+'s';
      el.style.transform='rotate('+rnd(-20,20)+'deg)';
      if(type==='WL'||type==='CL'){
        const src=type==='WL'?LOGO_WHITE:LOGO_COLOR;
        const h=16+Math.random()*14;
        el.innerHTML='<img src="'+src+'" style="height:'+h+'px;width:auto;display:block;">';
      }else{el.style.fontSize=(18+Math.random()*18)+'px';el.textContent=type;}
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),4200);
    },i*85);
  }
}

// ─── MASTER MODE ────────────────────────────────────
const isMaster=location.hash==='#master';
let masterIdx=-1,masterTimer=null,masterRunning=false,masterSpeed=4500;

function mountMasterUI(){
  document.body.insertAdjacentHTML('beforeend',`
    <div id="master-badge">● MASTER</div>
    <div id="master-ui">
      <button class="master-btn" onclick="masterStep(-1)">◀ 이전</button>
      <button class="master-btn active" id="m-play" onclick="masterToggle()">⏸ 일시정지</button>
      <button class="master-btn" onclick="masterStep(1)">다음 ▶</button>
      <div id="master-counter">0 / 0</div>
    </div>
  `);
  document.getElementById('board').addEventListener('click',e=>{
    if(!e.target.closest('.mcard')&&!e.target.closest('.mcard-del'))masterStep(1);
  });
}

function masterToggle(){
  masterRunning=!masterRunning;
  const btn=document.getElementById('m-play');
  if(btn){btn.textContent=masterRunning?'⏸ 일시정지':'▶ 재생';btn.className='master-btn'+(masterRunning?' active':'');}
  if(masterRunning)masterNext();else clearTimeout(masterTimer);
}

function masterStep(dir){
  clearTimeout(masterTimer);
  if(cardQueue.length===0)return;
  masterIdx=((masterIdx+dir)%cardQueue.length+cardQueue.length)%cardQueue.length;
  focusMasterCard(masterIdx);
  updateMasterCounter();
  if(masterRunning)masterTimer=setTimeout(()=>masterStep(1),masterSpeed);
}

function masterNext(){
  if(!masterRunning)return;
  if(cardQueue.length===0){masterTimer=setTimeout(masterNext,2000);return;}
  masterIdx=(masterIdx+1)%cardQueue.length;
  focusMasterCard(masterIdx);
  updateMasterCounter();
  masterTimer=setTimeout(masterNext,masterSpeed);
}

function focusMasterCard(idx){
  document.querySelectorAll('.mcard.focused').forEach(el=>el.classList.remove('focused'));
  const target=cardQueue[idx];
  if(!target||!target.el)return;
  const card=target.el;
  card.classList.add('focused');
  const cx=parseFloat(card.style.left)||0;
  const cy=parseFloat(card.style.top)||0;
  const board=document.getElementById('board');
  const bw=board.offsetWidth,bh=board.offsetHeight;
  const ts=1.6;
  scale=ts;
  animatePan(bw/2-cx*ts,bh/2-cy*ts,1000);
}

function updateMasterCounter(){
  const el=document.getElementById('master-counter');
  if(el)el.textContent=(masterIdx+1)+' / '+cardQueue.length;
}

if(isMaster){
  setTimeout(()=>{
    mountMasterUI();
    masterRunning=true;
    if(cardQueue.length>0)masterNext();
    else{
      const wait=setInterval(()=>{if(cardQueue.length>0){clearInterval(wait);masterNext();}},500);
    }
  },1500);
}

        <input id="m-name" class="s-inp" type="text" placeholder="예: 동현 / 백엔드팀" maxlength="15" autocomplete="off"/>
        <div class="s-lbl">응원 메세지</div>
        <textarea id="m-msg" class="s-inp" placeholder="팀원들에게 응원을 보내보세요 💪" maxlength="80"></textarea>
        <div id="m-char">0 / 80</div>
        <input type="file" id="m-file-input" accept="image/*" style="display:none" onchange="mFileSelected(this)"/>
        <button class="s-photo-btn" id="m-photo-btn" onclick="document.getElementById('m-file-input').click()">📷 사진 추가하기 (선택)</button>
        <img id="m-img-preview" src="" alt=""/>
        <div style="margin-bottom:12px;"><div class="color-row m-swatch" id="m-color-row" style="justify-content:center;"></div></div>
        <button class="s-send" id="m-send" onclick="sendMobile()">응원 보내기 →</button>
        <div id="m-ok">🎉 응원이 화면에 나타났어요!</div>
      </div>
    </div>
  `);
  document.getElementById('m-msg').addEventListener('input',function(){
    document.getElementById('m-char').textContent=this.value.length+' / 80';
  });
}
function mFileSelected(input){
  if(!input.files||!input.files[0])return;
  mFile=input.files[0];
  const prev=document.getElementById('m-img-preview');
  prev.src=URL.createObjectURL(mFile);
  prev.style.display='block';
  document.getElementById('m-photo-btn').classList.add('has-img');
  document.getElementById('m-photo-btn').textContent='📷 사진 변경';
}
async function sendMobile(){
  const name=document.getElementById('m-name').value.trim();
  const msg=document.getElementById('m-msg').value.trim();
  if(!name||!msg){alert('이름과 메세지를 모두 입력해주세요!');return;}
  const btn=document.getElementById('m-send');btn.textContent='전송 중...';btn.disabled=true;
  try{
    let imageUrl='';
    if(mFile){
      btn.textContent='사진 업로드 중...';
      try{
        imageUrl=await Promise.race([uploadImage(mFile),new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),12000))]);
      }catch(e){
        console.warn('Storage:',e.message);
        if(!confirm('사진 업로드 실패.\n사진 없이 메세지만 보낼까요?')){btn.textContent='응원 보내기 →';btn.disabled=false;return;}
      }
    }
    await msgsRef.add({name,msg,imageUrl,t:firebase.firestore.FieldValue.serverTimestamp()});
    document.getElementById('m-ok').style.display='block';
    document.getElementById('m-msg').value='';document.getElementById('m-char').textContent='0 / 80';
    document.getElementById('m-img-preview').style.display='none';
    mFile=null;
    btn.textContent='또 보내기 →';btn.disabled=false;
    setTimeout(()=>{document.getElementById('m-ok').style.display='none';},3000);
  }catch(e){alert('오류: '+e.message);btn.textContent='응원 보내기 →';btn.disabled=false;}
}
</script>
</body>
</html>
