<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>피트스탑 AX — Live</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--red:#FF3A2F;}
    html,body{height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,'Apple SD Gothic Neo','Pretendard',sans-serif;}

    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
    @keyframes msgUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes floatHeart{
      0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg);}
      40%{transform:translateY(-100px) scale(1.3) rotate(-8deg);}
      70%{transform:translateY(-200px) scale(0.9) rotate(6deg);}
      100%{opacity:0;transform:translateY(-320px) scale(0.5) rotate(-4deg);}
    }
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

    /* ── 상단 헤더 ── */
    .hdr{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 18px 10px;
      background:linear-gradient(to bottom,rgba(0,0,0,0.8) 0%,transparent 100%);
    }
    .hdr-left{display:flex;align-items:center;gap:10px;}
    .hdr-avatar{
      width:40px;height:40px;border-radius:50%;
      background:linear-gradient(135deg,var(--red) 0%,#ff6b35 100%);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:900;color:white;
      border:2px solid rgba(255,255,255,0.25);
      cursor:pointer;flex-shrink:0;
    }
    .hdr-name{font-size:14px;font-weight:700;color:white;line-height:1.3;}
    .live-pill{
      display:inline-flex;align-items:center;gap:4px;
      background:var(--red);color:white;
      font-size:9px;font-weight:900;letter-spacing:1.2px;
      padding:2px 7px;border-radius:4px;margin-top:2px;
    }
    .live-dot{width:5px;height:5px;background:white;border-radius:50%;animation:pulse 1.5s infinite;}
    .hdr-right{display:flex;align-items:center;gap:8px;}
    .viewer-pill{
      display:flex;align-items:center;gap:5px;
      background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);
      padding:5px 12px;border-radius:20px;
      font-size:13px;font-weight:600;color:white;
    }
    #admin-badge{font-size:10px;font-weight:700;color:white;background:var(--red);padding:3px 10px;border-radius:20px;display:none;}
    #reset-btn{font-size:11px;color:rgba(255,255,255,0.4);background:none;border:1px solid rgba(255,255,255,0.15);cursor:pointer;padding:4px 10px;border-radius:20px;display:none;}
    #reset-btn:hover{color:white;}

    /* ── 메세지 피드 ── */
    #feed{
      position:fixed;
      bottom:80px;left:16px;
      width:min(440px, calc(100vw - 170px));
      max-height:70vh;
      display:flex;flex-direction:column;
      gap:7px;
      overflow:hidden;
      z-index:50;
    }
    .mrow{
      display:flex;align-items:flex-end;gap:8px;
      animation:msgUp 0.38s cubic-bezier(0.34,1.3,0.64,1) forwards;
    }
    .mavatar{
      width:30px;height:30px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;color:white;flex-shrink:0;
      margin-bottom:1px;
    }
    .mbubble{
      background:rgba(255,255,255,0.13);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px 18px 18px 4px;
      padding:7px 13px;
      max-width:320px;
    }
    .mname{font-size:11px;font-weight:700;margin-bottom:2px;}
    .mtext{font-size:14px;color:rgba(255,255,255,0.9);line-height:1.45;word-break:break-word;}
    .mdel{
      width:22px;height:22px;border-radius:50%;
      background:rgba(255,50,50,0.65);border:none;cursor:pointer;
      color:white;font-size:10px;flex-shrink:0;
      display:none;align-items:center;justify-content:center;
      margin-bottom:3px;
    }
    .admin-mode .mrow:hover .mdel{display:flex;}

    /* ── 하트 ── */
    .heart{
      position:fixed;bottom:90px;pointer-events:none;z-index:200;
      animation:floatHeart 2.8s ease-out forwards;
    }

    /* ── QR 패널 (우측) ── */
    .qr-panel{
      position:fixed;top:72px;right:16px;z-index:80;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:18px;padding:16px;
      display:flex;flex-direction:column;align-items:center;gap:10px;
    }
    #qrcode{width:130px;height:130px;border-radius:8px;overflow:hidden;}
    .qr-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.5px;}
    #resp-count{font-size:10px;color:rgba(255,255,255,0.3);}

    /* ── 하단 입력바 ── */
    .input-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:100;
      padding:10px 14px 22px;
      background:linear-gradient(to top,rgba(0,0,0,0.9) 60%,transparent 100%);
      display:flex;align-items:center;gap:8px;
    }
    .ibox{
      flex:1;display:flex;align-items:center;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:26px;padding:0 14px;gap:8px;
    }
    .ibox:focus-within{border-color:rgba(255,255,255,0.35);}
    #inp-name{
      width:76px;flex-shrink:0;
      background:none;border:none;outline:none;
      font-size:13px;font-weight:600;color:rgba(255,255,255,0.65);
      font-family:inherit;
      border-right:1px solid rgba(255,255,255,0.12);
      padding:12px 10px 12px 0;
    }
    #inp-name::placeholder{color:rgba(255,255,255,0.25);}
    #inp-msg{
      flex:1;background:none;border:none;outline:none;
      font-size:14px;color:white;font-family:inherit;padding:12px 0;
    }
    #inp-msg::placeholder{color:rgba(255,255,255,0.25);}
    .hbtn{
      width:44px;height:44px;border-radius:50%;flex-shrink:0;
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
      cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;
      transition:transform 0.15s;
    }
    .hbtn:hover{transform:scale(1.1);}
    .hbtn:active{transform:scale(0.92);}
    .sbtn{
      width:44px;height:44px;border-radius:50%;flex-shrink:0;
      background:var(--red);border:none;cursor:pointer;
      font-size:17px;color:white;display:flex;align-items:center;justify-content:center;
      transition:transform 0.15s,opacity 0.15s;
    }
    .sbtn:hover{transform:scale(1.08);}
    .sbtn:disabled{opacity:0.4;cursor:not-allowed;}

    /* ── 모바일 submit ── */
    #submit-view{min-height:100vh;display:flex;align-items:flex-end;background:#0a0a0a;}
    .s-panel{
      width:100%;background:#1c1c1e;border-radius:26px 26px 0 0;
      padding:20px 20px 40px;
    }
    .s-drag{width:36px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:0 auto 20px;}
    .s-title{font-size:18px;font-weight:900;color:white;margin-bottom:3px;}
    .s-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:22px;}
    .s-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1.2px;margin-bottom:8px;}
    .s-inp{
      width:100%;padding:13px 16px;margin-bottom:14px;
      background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;font-size:15px;color:white;font-family:inherit;outline:none;
      transition:border-color 0.18s;
    }
    .s-inp:focus{border-color:var(--red);}
    .s-inp::placeholder{color:rgba(255,255,255,0.2);}
    textarea.s-inp{resize:none;height:88px;line-height:1.55;}
    #m-char{text-align:right;font-size:10px;color:rgba(255,255,255,0.2);margin-top:-10px;margin-bottom:14px;}
    .s-send{
      width:100%;padding:15px;background:var(--red);color:white;
      border:none;border-radius:12px;font-size:16px;font-weight:700;
      cursor:pointer;font-family:inherit;transition:opacity 0.15s;
    }
    .s-send:hover{opacity:0.88;}
    .s-send:disabled{opacity:0.4;cursor:not-allowed;}
    #m-ok{display:none;margin-top:14px;text-align:center;color:rgba(255,255,255,0.5);font-size:14px;animation:fadeIn 0.3s;}
  </style>
</head>
<body>

<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyB5VpEbNq3rnkPX8ccvBpAZ6gwew9rraOw",
    authDomain:        "wad-sso-project.firebaseapp.com",
    projectId:         "wad-sso-project",
    storageBucket:     "wad-sso-project.firebasestorage.app",
    messagingSenderId: "452975502054",
    appId:             "1:452975502054:web:1ddfe8ece45d19708b9127"
  };
  firebase.initializeApp(firebaseConfig);
  const db=firebase.firestore();
  const msgsRef=db.collection('ax-pitstop-messages');
</script>

<script>
  const PALETTE=['#FF3A2F','#E91E63','#AB47BC','#5C6BC0','#29B6F6','#26A69A','#FFA726','#EF5350'];
  const HEARTS =['❤️','🧡','💛','💚','💙','💜','🔥','✨','💥','🎉'];
  const ADMIN_PW='catchtable';

  function colorFor(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return PALETTE[Math.abs(h)%PALETTE.length];}
  function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  const isSubmit=location.hash==='#submit';
  document.addEventListener('DOMContentLoaded',()=>{isSubmit?mountSubmit():mountDisplay();});

  /* ─── DISPLAY ── */
  function mountDisplay(){
    document.body.insertAdjacentHTML('beforeend',`
      <div class="hdr">
        <div class="hdr-left">
          <div class="hdr-avatar" id="admin-tap" onclick="adminClick()">AX</div>
          <div>
            <div class="hdr-name">피트스탑 AX 2025</div>
            <div><span class="live-pill"><span class="live-dot"></span>LIVE</span></div>
          </div>
        </div>
        <div class="hdr-right">
          <span id="admin-badge">ADMIN</span>
          <button id="reset-btn" onclick="resetMessages()">전체삭제</button>
          <div class="viewer-pill">👁 <span id="msg-count">0</span></div>
        </div>
      </div>

      <div id="feed"></div>

      <div class="qr-panel">
        <div id="qrcode"></div>
        <div class="qr-label">QR 스캔하기</div>
        <div id="resp-count">0 responded</div>
      </div>

      <div class="input-bar">
        <div class="ibox">
          <input id="inp-name" type="text" placeholder="이름" maxlength="12" autocomplete="off"/>
          <input id="inp-msg"  type="text" placeholder="응원 메세지..." maxlength="60"
            onkeydown="if(event.key==='Enter')sendMsg()"/>
        </div>
        <button class="hbtn" onclick="spawnHearts(8)">❤️</button>
        <button class="sbtn" id="d-send" onclick="sendMsg()">➤</button>
      </div>
    `);

    const qrUrl=location.origin+location.pathname+'#submit';
    new QRCode(document.getElementById('qrcode'),{text:qrUrl,width:130,height:130,colorDark:'#111',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});

    let count=0,initialLoad=true;
    msgsRef.orderBy('t','asc').onSnapshot((snap)=>{
      snap.docChanges().forEach((ch)=>{
        if(ch.type==='added'){
          const m=ch.doc.data();
          count++;
          document.getElementById('msg-count').textContent=count;
          document.getElementById('resp-count').textContent=count+' responded';
          addRow(m,ch.doc.id,!initialLoad);
          if(!initialLoad)spawnHearts(4);
        }
        if(ch.type==='removed'){
          const el=document.querySelector(`[data-id="${ch.doc.id}"]`);
          if(el){el.style.opacity='0';el.style.transform='scale(0.85)';el.style.transition='all 0.2s';setTimeout(()=>el.remove(),200);}
        }
      });
      initialLoad=false;
    });
  }

  function addRow(m,docId,animate){
    const feed=document.getElementById('feed');
    const c=colorFor(m.name);
    const row=document.createElement('div');
    row.className='mrow';
    row.dataset.id=docId;
    if(!animate)row.style.animation='none';
    row.innerHTML=`
      <div class="mavatar" style="background:${c};">${esc(m.name.slice(0,2))}</div>
      <div class="mbubble">
        <div class="mname" style="color:${c};">${esc(m.name)}</div>
        <div class="mtext">${esc(m.msg)}</div>
      </div>
      <button class="mdel" onclick="deleteOne('${docId}',this)">✕</button>`;
    feed.appendChild(row);
    const rows=feed.querySelectorAll('.mrow');
    if(rows.length>25)rows[0].remove();
  }

  async function sendMsg(){
    const name=document.getElementById('inp-name').value.trim();
    const msg=document.getElementById('inp-msg').value.trim();
    if(!name||!msg){alert('이름과 메세지를 입력해주세요!');return;}
    const btn=document.getElementById('d-send');
    btn.disabled=true;
    try{
      await msgsRef.add({name,msg,t:firebase.firestore.FieldValue.serverTimestamp()});
      document.getElementById('inp-msg').value='';
      spawnHearts(6);
    }catch(e){alert('오류: '+e.message);}
    btn.disabled=false;
  }

  function spawnHearts(n){
    n=n||6;
    for(let i=0;i<n;i++){
      setTimeout(()=>{
        const h=document.createElement('div');
        h.className='heart';
        h.textContent=HEARTS[Math.floor(Math.random()*HEARTS.length)];
        h.style.left=(15+Math.random()*55)+'vw';
        h.style.fontSize=(18+Math.random()*18)+'px';
        h.style.animationDuration=(2.2+Math.random()*1.2)+'s';
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),4000);
      },i*100);
    }
  }

  /* ── ADMIN ── */
  let aClicks=0,aTimer=null,isAdmin=false;
  function adminClick(){
    aClicks++;clearTimeout(aTimer);
    aTimer=setTimeout(()=>{aClicks=0;},2000);
    if(aClicks>=5){
      aClicks=0;
      if(isAdmin){
        isAdmin=false;document.body.classList.remove('admin-mode');
        document.getElementById('admin-badge').style.display='none';
        document.getElementById('reset-btn').style.display='none';
      } else {
        const pw=prompt('관리자 비밀번호');
        if(pw===ADMIN_PW){
          isAdmin=true;document.body.classList.add('admin-mode');
          document.getElementById('admin-badge').style.display='inline-block';
          document.getElementById('reset-btn').style.display='inline-block';
        } else if(pw!==null)alert('비밀번호가 틀렸습니다');
      }
    }
  }
  async function resetMessages(){
    if(!confirm('모든 메세지를 삭제할까요?'))return;
    const snap=await msgsRef.get();const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));await batch.commit();location.reload();
  }
  async function deleteOne(docId,btn){
    if(!isAdmin)return;btn.textContent='...';
    try{await msgsRef.doc(docId).delete();}catch(e){btn.textContent='✕';}
  }

  /* ─── SUBMIT (모바일) ── */
  function mountSubmit(){
    document.body.style.overflow='auto';
    document.body.insertAdjacentHTML('beforeend',`
      <div id="submit-view">
        <div class="s-panel">
          <div class="s-drag"></div>
          <div class="s-title">피트스탑 AX 🚀</div>
          <div class="s-sub">Live 응원메세지</div>
          <div class="s-lbl">이름 (닉네임)</div>
          <input id="m-name" class="s-inp" type="text" placeholder="예: 동현 / 백엔드팀" maxlength="15" autocomplete="off"/>
          <div class="s-lbl">응원 메세지</div>
          <textarea id="m-msg" class="s-inp" placeholder="팀원들에게 응원을 보내보세요 💪" maxlength="80"></textarea>
          <div id="m-char">0 / 80</div>
          <button class="s-send" id="m-send" onclick="sendMobile()">응원 보내기 →</button>
          <div id="m-ok">🎉 응원이 화면에 나타났어요!</div>
        </div>
      </div>
    `);
    document.getElementById('m-msg').addEventListener('input',function(){
      document.getElementById('m-char').textContent=this.value.length+' / 80';
    });
  }
  async function sendMobile(){
    const name=document.getElementById('m-name').value.trim();
    const msg=document.getElementById('m-msg').value.trim();
    if(!name||!msg){alert('이름과 메세지를 모두 입력해주세요!');return;}
    const btn=document.getElementById('m-send');btn.textContent='전송 중...';btn.disabled=true;
    try{
      await msgsRef.add({name,msg,t:firebase.firestore.FieldValue.serverTimestamp()});
      document.getElementById('m-ok').style.display='block';
      document.getElementById('m-msg').value='';document.getElementById('m-char').textContent='0 / 80';
      btn.textContent='또 보내기 →';btn.disabled=false;
      setTimeout(()=>{document.getElementById('m-ok').style.display='none';},3000);
    }catch(e){alert('오류: '+e.message);btn.textContent='응원 보내기 →';btn.disabled=false;}
  }
</script>
</body>
</html>
